send_command:
  name: Send dialog command
  description: Send a custom command payload through the Home Assistant event bus with payload {actionType, variables}.
  fields:
    clientId:
      name: Client ID
      description: Client identifier sent as a string in the request body.
      required: true
      example: "client-1"
      selector:
        text:
    deviceId:
      name: Device ID
      description: Device identifier sent as a string in the request body.
      required: true
      example: "media_player.kitchen"
      selector:
        text:
    actionType:
      name: Action type
      description: Action type sent as a string in the request body.
      required: true
      example: "turn_on_light"
      selector:
        text:
    variables:
      name: Variables JSON
      description: JSON object inserted into the variables field of the request body.
      required: false
      example: '{"brightness": 80, "color": "warm"}'
      selector:
        text:
          multiline: true
    useDeclension:
      name: Use declension
      description: Whether to apply declension to the generated response text.
      required: false
      default: true
      example: true
      selector:
        boolean: {}

alarm_script:
  name: Alarm script
  description: Create, list, or delete Dialog Custom UI alarms from Home Assistant YAML scripts. Info returns JSON items with time, uuid, and clientId.
  fields:
    action:
      name: Action
      description: Operation for the alarm helper.
      required: true
      default: create
      selector:
        select:
          options:
            - value: create
              label: Создать
            - value: info
              label: Информация о запущенных
            - value: delete
              label: Удалить
    hh:
      name: HH
      description: Alarm hour for create.
      required: false
      selector:
        number:
          min: 0
          max: 23
          mode: box
    mm:
      name: MM
      description: Alarm minute for create.
      required: false
      selector:
        number:
          min: 0
          max: 59
          mode: box
    repeat_type:
      name: Repeat
      description: Alarm repeat mode for create.
      required: false
      default: once
      selector:
        select:
          options:
            - value: once
              label: Один раз
            - value: daily
              label: Повторять каждый день
            - value: weekdays
              label: По будням
            - value: weekends
              label: По выходным
            - value: custom
              label: Кастом
    repeat_days:
      name: Custom days
      description: Custom repeat days, for example понедельник, вторник.
      required: false
      selector:
        text:
    convert_day_period:
      name: Convert morning/evening
      description: Convert an entered morning hour to evening time by adding 12 hours.
      required: false
      default: false
      selector:
        boolean: {}
    target:
      name: Alarm number
      description: One-based alarm number from the info list to delete.
      required: false
      selector:
        text:
    response_variable:
      name: Response variable
      description: Name of the Home Assistant script variable that should receive the service response.
      required: false
      selector:
        text:
    clientId:
      name: Client ID
      description: Optional client identifier. Defaults to integration client_id.
      required: false
      selector:
        text:
    deviceId:
      name: Device ID
      description: Optional device identifier.
      required: false
      selector:
        text:

timer_script:
  name: Timer script
  description: Create, list, or delete Dialog Custom UI timers from Home Assistant YAML scripts. Info returns JSON items with time, uuid, and clientId.
  fields:
    action:
      name: Action
      description: Operation for the timer helper.
      required: true
      default: create
      selector:
        select:
          options:
            - value: create
              label: Создать
            - value: info
              label: Информация о запущенных
            - value: delete
              label: Удалить
    hh:
      name: HH
      description: Timer hours for create.
      required: false
      selector:
        number:
          min: 0
          mode: box
    mm:
      name: MM
      description: Timer minutes for create.
      required: false
      selector:
        number:
          min: 0
          mode: box
    ss:
      name: SS
      description: Timer seconds for create.
      required: false
      selector:
        number:
          min: 0
          mode: box
    target:
      name: Timer UUID
      description: Timer UUID from the info list to delete.
      required: false
      selector:
        text:
    response_variable:
      name: Response variable
      description: Name of the Home Assistant script variable that should receive the service response.
      required: false
      selector:
        text:
    clientId:
      name: Client ID
      description: Optional client identifier. Defaults to integration client_id.
      required: false
      selector:
        text:
    deviceId:
      name: Device ID
      description: Optional device identifier.
      required: false
      selector:
        text:
