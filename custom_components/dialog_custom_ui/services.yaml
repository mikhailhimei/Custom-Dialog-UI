send_command:
  name: Send dialog command
  description: Send a custom command payload through the Home Assistant event bus with payload {actionType, variables}.
  fields:
    clientId:
      name: Client ID
      description: Client identifier sent as a string in the request body.
      required: true
      example: "client-1"
      selector:
        text:
    deviceId:
      name: Device ID
      description: Device identifier sent as a string in the request body.
      required: true
      example: "media_player.kitchen"
      selector:
        text:
    actionType:
      name: Action type
      description: Action type sent as a string in the request body.
      required: true
      example: "turn_on_light"
      selector:
        text:
    variables:
      name: Variables JSON
      description: JSON object inserted into the variables field of the request body.
      required: false
      example: '{"brightness": 80, "color": "warm"}'
      selector:
        text:
          multiline: true
    useDeclension:
      name: Use declension
      description: Whether to apply declension to the generated response text.
      required: false
      default: true
      example: true
      selector:
        boolean: {}

alarm_create:
  name: Alarm create
  description: Create a Dialog Custom UI alarm from Home Assistant YAML scripts.
  fields:
    hh:
      name: HH
      description: Alarm hour.
      required: false
      selector:
        number:
          min: 0
          max: 23
          mode: box
    mm:
      name: MM
      description: Alarm minute.
      required: false
      selector:
        number:
          min: 0
          max: 59
          mode: box
    clientId:
      name: Client ID
      description: Optional client identifier. Defaults to integration client_id.
      required: false
      selector:
        text:
    deviceId:
      name: Device ID
      description: Optional device identifier.
      required: false
      selector:
        text:
    repeat_type:
      name: Repeat
      description: Alarm repeat mode.
      required: false
      default: once
      selector:
        select:
          options:
            - value: once
              label: Один раз
            - value: daily
              label: Повторять каждый день
            - value: weekdays
              label: По будням
            - value: weekends
              label: По выходным
            - value: custom
              label: Кастом
    repeat_days:
      name: Custom days
      description: Custom repeat days used only when Repeat is custom.
      required: false
      selector:
        select:
          multiple: true
          mode: dropdown
          options:
            - value: monday
              label: Понедельник
            - value: tuesday
              label: Вторник
            - value: wednesday
              label: Среда
            - value: thursday
              label: Четверг
            - value: friday
              label: Пятница
            - value: saturday
              label: Суббота
            - value: sunday
              label: Воскресенье
    convert_day_period:
      name: Convert morning/evening
      description: Convert an entered morning hour to evening time by adding 12 hours.
      required: false
      default: false
      selector:
        boolean: {}

alarm_info:
  name: Alarm info
  description: List Dialog Custom UI alarms. Returns JSON items with time, uuid, and clientId.
  fields:
    clientId:
      name: Client ID
      description: Optional client identifier. Defaults to integration client_id.
      required: false
      selector:
        text:

alarm_delete:
  name: Alarm delete
  description: Delete a Dialog Custom UI alarm by UUID.
  fields:
    uuid:
      name: UUID
      description: Alarm UUID from the info list to delete.
      required: true
      selector:
        text:

