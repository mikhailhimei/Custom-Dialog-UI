send_command:
  name: Send dialog command
  description: Send a custom command payload. In redis_subscribe mode fires HA event DIALOG_MESSAGE:{clientId}:{deviceId}. If event name exceeds HA 64-char limit, falls back to DIALOG_MESSAGE. Payload includes clientId, deviceId, actionType, variables; otherwise POSTs to /api/dialog/save-commands.
  fields:
    clientId:
      name: Client ID
      description: Client identifier sent as a string in the request body.
      required: true
      example: "client-1"
      selector:
        text:
    deviceId:
      name: Device ID
      description: Device identifier sent as a string in the request body.
      required: true
      example: "media_player.kitchen"
      selector:
        text:
    actionType:
      name: Action type
      description: Action type sent as a string in the request body.
      required: true
      example: "turn_on_light"
      selector:
        text:
    variables:
      name: Variables JSON
      description: JSON object inserted into the variables field of the request body.
      required: false
      example: '{"brightness": 80, "color": "warm"}'
      selector:
        text:
          multiline: true
